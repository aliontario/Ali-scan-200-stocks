<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elliott Wave W4 Screener</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e17; --surface: #111827; --border: #1e2d40;
    --blue: #1d6fa4; --blue-glow: #2a9fd6; --green: #00c896;
    --red: #ff4d6d; --text: #e2e8f0; --muted: #64748b;
    --mono: 'JetBrains Mono', monospace; --sans: 'Inter', sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.15em; color: var(--blue-glow); text-transform: uppercase; }
  .logo span { color: var(--muted); font-weight: 400; }
  .badge { font-family: var(--mono); font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--green); color: var(--green); letter-spacing: 0.1em; }
  main { padding: 32px; max-width: 1100px; margin: 0 auto; }
  .controls { display: grid; grid-template-columns: 1fr 160px auto; gap: 12px; margin-bottom: 28px; align-items: end; }
  .field label { display: block; font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: 0.1em; margin-bottom: 6px; text-transform: uppercase; }
  textarea, select { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 10px 12px; border-radius: 6px; resize: vertical; outline: none; }
  textarea { min-height: 80px; }
  .scan-btn { background: var(--blue); color: #fff; border: none; font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: 0.12em; padding: 12px 28px; border-radius: 6px; cursor: pointer; text-transform: uppercase; white-space: nowrap; height: fit-content; }
  .scan-btn:hover { background: var(--blue-glow); }
  .scan-btn:disabled { background: var(--muted); cursor: not-allowed; }
  .progress-wrap { display: none; margin-bottom: 24px; }
  .progress-wrap.active { display: block; }
  .progress-bar-bg { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--blue-glow)); width: 0%; transition: width 0.3s ease; border-radius: 4px; }
  .progress-text { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .summary { display: none; gap: 16px; margin-bottom: 24px; }
  .summary.active { display: flex; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; flex: 1; }
  .stat-card .val { font-family: var(--mono); font-size: 24px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .stat-card .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-card.highlight { border-color: var(--blue-glow); }
  .stat-card.highlight .val { color: var(--blue-glow); }
  .results-wrap { display: none; }
  .results-wrap.active { display: block; }
  .section-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 8px 12px; text-align: left; font-weight: 400; }
  tbody tr { border-bottom: 1px solid #1a2233; }
  tbody tr:hover { background: #131c2b; }
  td { padding: 12px; vertical-align: middle; }
  .ticker { font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--blue-glow); }
  .ticker a { color: inherit; text-decoration: none; }
  .ticker a:hover { text-decoration: underline; }
  .price { font-family: var(--mono); font-weight: 600; }
  .wave-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-family: var(--mono); font-size: 11px; font-weight: 700; }
  .w4-badge { background: #1a2d4a; border: 1px solid var(--blue-glow); color: var(--blue-glow); }
  .level { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .level .val { color: var(--text); }
  .chg-pos { color: var(--green); font-family: var(--mono); font-size: 12px; }
  .chg-neg { color: var(--red); font-family: var(--mono); font-size: 12px; }
  .message { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 40px; text-align: center; border: 1px dashed var(--border); border-radius: 8px; margin-top: 8px; }
  .err-box { background: #1a0a0a; border: 1px solid var(--red); border-radius: 6px; padding: 12px 16px; font-family: var(--mono); font-size: 11px; color: var(--red); margin-bottom: 16px; display: none; }
  .footnote { margin-top: 32px; font-size: 11px; color: var(--muted); font-family: var(--mono); line-height: 1.8; }
</style>
</head>
<body>
<header>
  <div class="logo">Elliott Wave <span>// </span>W4 Screener</div>
  <div class="badge" id="statusBadge">READY</div>
</header>
<main>
  <div class="err-box" id="errBox"></div>
  <div class="controls">
    <div class="field">
      <label>Ticker Symbols (comma separated)</label>
      <textarea id="tickerInput">AAPL, MSFT, NVDA, AMD, INTC, QCOM, AVGO, TXN, AMAT, LRCX, KLAC, MRVL, MU, ADI, SNPS, GOOGL, META, CRM, ORCL, ADBE, NOW, SNOW, DDOG, ZS, TEAM, AMZN, TSLA, NFLX, SHOP, EBAY, UBER, ABNB, PYPL, COIN, JPM, BAC, GS, MS, WFC, C, AXP, BLK, SCHW, CME, UNH, JNJ, PFE, MRK, ABBV, LLY, BMY, AMGN, GILD, ISRG, XOM, CVX, MPC, VLO, PSX, COP, EOG, SLB, OXY, WMT, TGT, COST, HD, LOW, NKE, SBUX, MCD, CMG, PG, KO, PEP, BA, CAT, GE, HON, LMT, RTX, FDX, UPS, CSX, AMT, PLD, EQIX, NEE, DUK, FCX, NEM, ALB, CF, GOLD</textarea>
    </div>
    <div class="field">
      <label>Timeframe</label>
      <select id="intervalSelect">
        <option value="1h">Hourly (1H)</option>
        <option value="4h">4 Hour (4H)</option>
        <option value="1d">Daily (1D)</option>
        <option value="1wk">Weekly (1W)</option>
        <option value="1mo">Monthly (1M)</option>
      </select>
    </div>
    <button class="scan-btn" id="scanBtn" onclick="runScan()">▶ SCAN</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Initializing...</div>
  </div>

  <div class="summary" id="summary">
    <div class="stat-card"><div class="val" id="statTotal">—</div><div class="lbl">Scanned</div></div>
    <div class="stat-card highlight"><div class="val" id="statW4">—</div><div class="lbl">In W4 Zone</div></div>
    <div class="stat-card"><div class="val" id="statFailed">—</div><div class="lbl">Failed</div></div>
  </div>

  <div class="results-wrap" id="resultsWrap">
    <div class="section-title">Stocks in Wave 4 pullback zone</div>
    <div id="resultsContainer"></div>
  </div>

  <div class="footnote">
    Data: Yahoo Finance · Wave logic: W1→W2→W3→W4 candle pattern detection · W4 = bearish pullback after W3 staying above W3 low
  </div>
</main>

<script>
// ── Elliott Wave Detection ──
function detectW4(candles) {
  let state = 0, w1Low = null, w3High = null, w3Low = null, w4Low = null;
  for (let i = 1; i < candles.length; i++) {
    const c = candles[i], p = candles[i-1];
    const g0 = c.close > c.open, g1 = p.close > p.open;
    const r0 = c.close < c.open, r1 = p.close < p.open;
    const bull = (g0 && r1 && c.close > p.open && c.open < p.close) || (g0 && g1 && c.close > p.high);
    const bear = (r0 && g1 && c.close < p.open && c.open > p.close) || (r0 && r1 && c.close < p.low);

    if      (state === 0 && bull) { state = 1; w1Low = Math.min(c.low, p.low); }
    else if (state === 1 && bear) { if (c.close >= w1Low) state = 2; else { state = 0; w1Low = null; } }
    else if (state === 2 && bull) { state = 3; w3High = Math.max(c.high, p.high); w3Low = Math.min(c.low, p.low); }
    else if (state === 3 && bear) {
      if (c.close >= w3Low) { state = 4; w4Low = Math.min(c.low, p.low); }
      else { state = 0; w1Low = w3High = w3Low = null; }
    } else if (state === 4 && c.close > w3High) {
      state = 0; w1Low = w3High = w3Low = w4Low = null;
    }
  }
  return state === 4 ? { w3High, w4Low } : null;
}

// ── Fetch via multiple proxy fallbacks ──
async function fetchCandles(ticker, interval) {
  const range = interval === '1h' ? '7d' : interval === '4h' ? '60d' : interval === '1d' ? '6mo' : interval === '1wk' ? '2y' : '5y';
  const yhooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=${interval}&range=${range}&events=history`;

  // Try proxies in order
  const proxies = [
    `https://corsproxy.io/?${encodeURIComponent(yhooUrl)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yhooUrl)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(yhooUrl)}`
  ];

  for (const proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const raw = await res.json();
      // allorigins wraps in .contents, others return directly
      const parsed = raw.contents ? JSON.parse(raw.contents) : raw;
      const result = parsed?.chart?.result?.[0];
      if (!result) continue;
      const ts = result.timestamp;
      const q  = result.indicators.quote[0];
      const candles = [];
      for (let i = 0; i < ts.length; i++) {
        if (q.open[i] != null && q.close[i] != null) {
          candles.push({ date: new Date(ts[i]*1000).toLocaleDateString(), open: q.open[i], high: q.high[i], low: q.low[i], close: q.close[i] });
        }
      }
      if (candles.length > 5) return candles;
    } catch(e) { continue; }
  }
  return null;
}

// ── Main scan ──
async function runScan() {
  const tickers = document.getElementById('tickerInput').value
    .split(',').map(t => t.trim().toUpperCase()).filter(Boolean);
  const interval = document.getElementById('intervalSelect').value;
  const btn = document.getElementById('scanBtn');

  btn.disabled = true; btn.textContent = '⏳ SCANNING...';
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('statusBadge').textContent = 'SCANNING';

  const pw = document.getElementById('progressWrap');
  const pf = document.getElementById('progressFill');
  const pt = document.getElementById('progressText');
  pw.classList.add('active');

  const w4Results = [];
  let failed = 0;

  for (let i = 0; i < tickers.length; i++) {
    const ticker = tickers[i];
    pf.style.width = Math.round((i+1)/tickers.length*100) + '%';
    pt.textContent  = `Scanning ${ticker}  (${i+1} / ${tickers.length})`;

    try {
      const candles = await fetchCandles(ticker, interval);
      if (!candles) { failed++; continue; }
      const result = detectW4(candles);
      if (result) {
        const last = candles[candles.length-1];
        const prev = candles[candles.length-2];
        const chg  = ((last.close - prev.close) / prev.close * 100).toFixed(2);
        w4Results.push({ ticker, price: last.close.toFixed(2), chg, w3High: result.w3High.toFixed(2), w4Low: result.w4Low.toFixed(2), date: last.date });
      }
    } catch(e) { failed++; }

    await new Promise(r => setTimeout(r, 200));
  }

  pw.classList.remove('active');

  // Summary
  document.getElementById('summary').classList.add('active');
  document.getElementById('statTotal').textContent  = tickers.length;
  document.getElementById('statW4').textContent     = w4Results.length;
  document.getElementById('statFailed').textContent = failed;
  document.getElementById('statusBadge').textContent = 'DONE';
  const tfLabel = {'1h':'1H','4h':'4H','1d':'Daily','1wk':'Weekly','1mo':'Monthly'}[interval] || interval;
  document.querySelector('.section-title').textContent = `Stocks in Wave 4 pullback zone — ${tfLabel} chart`;

  if (failed === tickers.length) {
    const eb = document.getElementById('errBox');
    eb.textContent = '⚠ All requests failed. This usually means the proxy is being blocked by your network or browser. Try opening the file from a web server, or disable any VPN/firewall temporarily.';
    eb.style.display = 'block';
  }

  // Results
  const wrap = document.getElementById('resultsWrap');
  const container = document.getElementById('resultsContainer');
  wrap.classList.add('active');

  if (w4Results.length === 0) {
    container.innerHTML = `<div class="message">No stocks in W4 zone right now across ${tickers.length - failed} successfully scanned symbols.</div>`;
  } else {
    container.innerHTML = `
      <table>
        <thead><tr><th>Ticker</th><th>Price</th><th>Chg %</th><th>Wave</th><th>W3 High (Target)</th><th>W4 Low (Stop Loss)</th><th>Date</th></tr></thead>
        <tbody>
          ${w4Results.map(r => `
            <tr>
              <td class="ticker"><a href="https://finance.yahoo.com/chart/${r.ticker}" target="_blank">${r.ticker}</a></td>
              <td class="price">$${r.price}</td>
              <td class="${parseFloat(r.chg)>=0?'chg-pos':'chg-neg'}">${parseFloat(r.chg)>=0?'+':''}${r.chg}%</td>
              <td><span class="wave-badge w4-badge">W4 ZONE</span></td>
              <td class="level">$<span class="val">${r.w3High}</span></td>
              <td class="level">$<span class="val">${r.w4Low}</span></td>
              <td class="level">${r.date}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }

  btn.disabled = false; btn.textContent = '▶ SCAN';
}
</script>
</body>
</html>
